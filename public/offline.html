<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Toko Yasin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      font-size: 96px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 32px;
      color: #1f2937;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      display: inline-block;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .status {
      margin-top: 24px;
      padding: 12px;
      background: #fef3c7;
      border-radius: 8px;
      font-size: 14px;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Kamu Sedang Offline</h1>
    <p>
      Sepertinya tidak ada koneksi internet saat ini.
      Cek koneksi Anda dan coba lagi.
    </p>
    <a href="/" class="btn" onclick="window.location.reload()">
      Coba Lagi
    </a>
    <div class="status" id="status">
      Memeriksa koneksi...
    </div>
  </div>

  <script>
    // Check connection status
    function updateOnlineStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = '✅ Koneksi kembali! Klik "Coba Lagi" untuk melanjutkan.';
        statusEl.style.background = '#d1fae5';
        statusEl.style.color = '#065f46';
      } else {
        statusEl.textContent = '❌ Masih offline. Cek koneksi internet Anda.';
        statusEl.style.background = '#fee2e2';
        statusEl.style.color = '#991b1b';
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Auto-reload when back online
    window.addEventListener('online', () => {
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    });
  </script>
</body>
</html>
