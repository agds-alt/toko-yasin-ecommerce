<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Toko Buku Abdul</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #FF755B 0%, #FF5733 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 32px;
      padding: 48px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255, 117, 91, 0.4);
      border: 2px solid rgba(255, 117, 91, 0.1);
    }
    .icon {
      font-size: 96px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #FF755B 0%, #FF5733 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      background: linear-gradient(135deg, #FF755B 0%, #FF5733 100%);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      text-decoration: none;
      display: inline-block;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(255, 117, 91, 0.3);
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 32px rgba(255, 117, 91, 0.4);
    }
    .status {
      margin-top: 24px;
      padding: 16px;
      background: #fef3c7;
      border-radius: 12px;
      font-size: 14px;
      color: #92400e;
      font-weight: 600;
      border: 2px solid #fde68a;
    }
    .logo {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #FF755B 0%, #FF5733 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
      font-family: 'Urbanist', -apple-system, sans-serif;
      letter-spacing: -0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TOKO BUKU ABDUL</div>
    <div class="icon">📡</div>
    <h1>Tidak Ada Koneksi Internet</h1>
    <p>
      Website ini membutuhkan koneksi internet untuk dapat diakses.<br>
      Silakan periksa koneksi Anda dan coba lagi.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Muat Ulang
    </button>
    <div class="status" id="status">
      🔍 Memeriksa koneksi...
    </div>
  </div>

  <script>
    // Check connection status
    function updateOnlineStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = '✅ Koneksi kembali! Memuat ulang...';
        statusEl.style.background = '#d1fae5';
        statusEl.style.color = '#065f46';
        statusEl.style.borderColor = '#6ee7b7';

        // Auto-reload after 1 second
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        statusEl.textContent = '❌ Masih offline. Mohon periksa koneksi internet Anda.';
        statusEl.style.background = '#fee2e2';
        statusEl.style.color = '#991b1b';
        statusEl.style.borderColor = '#fca5a5';
      }
    }

    // Listen for connection changes
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Check on load
    updateOnlineStatus();

    // Periodic check every 3 seconds
    setInterval(updateOnlineStatus, 3000);
  </script>
</body>
</html>
